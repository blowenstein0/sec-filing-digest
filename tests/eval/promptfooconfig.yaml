description: "SEC Research Agent Evaluation Suite"

prompts:
  - "{{query}}"

providers:
  - id: "file://provider.js"
    label: "SEC Research Agent"

defaultTest:
  options:
    provider: "file://provider.js"
  assert:
    # Every response should have citations
    - type: javascript
      value: "file://scorers.js:citationQuality"
    # Every response should avoid filler
    - type: javascript
      value: "file://scorers.js:noFiller"

tests:
  # ============================================================
  # FINANCIAL ACCURACY — verified against DynamoDB ground truth
  # ============================================================

  - description: "AAPL FY2025 revenue (exact number check)"
    vars:
      query: "What was Apple's revenue in FY2025?"
      ticker: "AAPL"
      maxWords: 200
    assert:
      - type: contains
        value: "416"
      - type: javascript
        value: "file://scorers.js:financialAccuracy"
      - type: javascript
        value: "file://scorers.js:conciseness"

  - description: "AAPL net income trend"
    vars:
      query: "What is AAPL's net income over the last 5 years?"
      ticker: "AAPL"
      maxWords: 300
    assert:
      - type: contains
        value: "112"
      - type: javascript
        value: "file://scorers.js:financialAccuracy"

  - description: "AMZN revenue (exact number check)"
    vars:
      query: "What is Amazon's total revenue?"
      ticker: "AMZN"
      maxWords: 200
    assert:
      - type: contains
        value: "716"
      - type: javascript
        value: "file://scorers.js:financialAccuracy"

  - description: "BLK revenue"
    vars:
      query: "What is BlackRock's revenue?"
      ticker: "BLK"
      maxWords: 200
    assert:
      - type: contains
        value: "24"
      - type: javascript
        value: "file://scorers.js:financialAccuracy"

  - description: "AAPL R&D spending"
    vars:
      query: "How much does Apple spend on R&D?"
      ticker: "AAPL"
      maxWords: 250
    assert:
      - type: contains
        value: "34"
      - type: javascript
        value: "file://scorers.js:financialAccuracy"

  - description: "AMZN operating income recovery"
    vars:
      query: "Show me Amazon's operating income trend"
      ticker: "AMZN"
      maxWords: 300
    assert:
      - type: contains
        value: "80"  # $79.975B rounds to $80.0B
      - type: javascript
        value: "file://scorers.js:financialAccuracy"

  - description: "AAPL balance sheet — debt and cash"
    vars:
      query: "What is Apple's long-term debt and cash position?"
      ticker: "AAPL"
      maxWords: 250
    assert:
      - type: contains
        value: "90"
      - type: contains
        value: "35"
      - type: javascript
        value: "file://scorers.js:financialAccuracy"

  - description: "AAPL gross margin"
    vars:
      query: "What is Apple's gross profit and gross margin?"
      ticker: "AAPL"
      maxWords: 250
    assert:
      - type: contains
        value: "195"
      - type: javascript
        value: "file://scorers.js:financialAccuracy"

  # ============================================================
  # COMPARISONS — must mention all companies with numbers
  # ============================================================

  - description: "AAPL vs AMZN revenue comparison"
    vars:
      query: "Compare Apple and Amazon on revenue"
      tickers: ["AAPL", "AMZN"]
      maxWords: 400
    assert:
      - type: javascript
        value: "file://scorers.js:comparisonCompleteness"
      - type: javascript
        value: "file://scorers.js:financialAccuracy"
      - type: contains
        value: "416"
      - type: contains
        value: "716"

  - description: "AAPL vs AMZN profitability comparison"
    vars:
      query: "Compare AAPL vs AMZN on net income and operating margins"
      tickers: ["AAPL", "AMZN"]
      maxWords: 400
    assert:
      - type: javascript
        value: "file://scorers.js:comparisonCompleteness"
      - type: contains
        value: "112"
      - type: contains
        value: "77"

  - description: "Three-way comparison"
    vars:
      query: "Compare AAPL, AMZN, and BLK on revenue and debt"
      tickers: ["AAPL", "AMZN", "BLK"]
      maxWords: 500
    assert:
      - type: javascript
        value: "file://scorers.js:comparisonCompleteness"

  # ============================================================
  # NARRATIVE / FILING TEXT — risk factors, business, MD&A
  # ============================================================

  - description: "AAPL risk factors"
    vars:
      query: "What are Apple's main risk factors?"
      maxWords: 800
    assert:
      - type: llm-rubric
        value: "The answer lists specific risk factors from Apple's 10-K filing. It should reference concrete topics like supply chain concentration, trade/tariff risks, competition, regulatory, or macroeconomic risks. Generic business platitudes should fail."
      - type: not-contains
        value: "could not"
      - type: not-contains
        value: "unable to"

  - description: "BLK business overview"
    vars:
      query: "What does BlackRock do? Give me a business overview."
      maxWords: 400
    assert:
      - type: llm-rubric
        value: "The answer describes BlackRock as an asset management company and mentions key aspects of their business from SEC filings. It should include specifics like AUM scale, investment products (ETFs, fixed income, etc.), or technology services — not just 'they manage money'."

  - description: "AMZN business segments"
    vars:
      query: "What are Amazon's business segments?"
      maxWords: 400
    assert:
      - type: llm-rubric
        value: "The answer identifies Amazon's reportable segments from their SEC filings (e.g., North America, International, AWS) and includes at least some financial or operational detail about the segments."

  # ============================================================
  # CONCISENESS — agent should be tight
  # ============================================================

  - description: "Simple revenue question should be short"
    vars:
      query: "What is AAPL revenue?"
      ticker: "AAPL"
      maxWords: 150
    assert:
      - type: javascript
        value: "file://scorers.js:conciseness"
      - type: contains
        value: "416"

  - description: "Yes/no style question should be brief"
    vars:
      query: "Is Apple's revenue growing?"
      ticker: "AAPL"
      maxWords: 150
    assert:
      - type: javascript
        value: "file://scorers.js:conciseness"

  # ============================================================
  # DEEP DIVES — per-company coverage
  # ============================================================

  # --- AAPL deep dives ---

  - description: "AAPL stockholders equity trend"
    vars:
      query: "What is Apple's stockholders equity over the last 5 years?"
      ticker: "AAPL"
      maxWords: 250
    assert:
      - type: contains
        value: "73"  # FY2025 ~$73.7B
      - type: javascript
        value: "file://scorers.js:financialAccuracy"

  - description: "AAPL cost of revenue"
    vars:
      query: "What is Apple's cost of revenue?"
      ticker: "AAPL"
      maxWords: 200
    assert:
      - type: contains
        value: "220"  # FY2025 ~$221B
      - type: javascript
        value: "file://scorers.js:financialAccuracy"

  - description: "AAPL total assets"
    vars:
      query: "What are Apple's total assets?"
      ticker: "AAPL"
      maxWords: 200
    assert:
      - type: contains
        value: "359"  # FY2025 ~$359.2B
      - type: javascript
        value: "file://scorers.js:financialAccuracy"

  - description: "AAPL revenue growth rate"
    vars:
      query: "What was Apple's year-over-year revenue growth from FY2024 to FY2025?"
      ticker: "AAPL"
      maxWords: 200
    assert:
      - type: javascript
        value: "file://scorers.js:financialAccuracy"
      - type: llm-rubric
        value: "The answer provides a specific percentage growth rate calculated from actual revenue figures. The growth from $391.0B to $416.2B is approximately 6.4%."

  - description: "AAPL operating margin"
    vars:
      query: "What is Apple's operating margin?"
      ticker: "AAPL"
      maxWords: 200
    assert:
      - type: contains
        value: "133"  # Operating income ~$133.1B
      - type: javascript
        value: "file://scorers.js:financialAccuracy"

  # --- AMZN deep dives ---

  - description: "AMZN net income recovery story"
    vars:
      query: "Amazon had a loss in FY2022. What happened and how did they recover?"
      ticker: "AMZN"
      maxWords: 400
    assert:
      - type: javascript
        value: "file://scorers.js:financialAccuracy"
      - type: llm-rubric
        value: "The answer references Amazon's FY2022 net loss and the subsequent recovery to profitability in FY2023-FY2025, using specific numbers from the data."

  - description: "AMZN cash position"
    vars:
      query: "How much cash does Amazon have?"
      ticker: "AMZN"
      maxWords: 200
    assert:
      - type: contains
        value: "86"  # FY2025 ~$86.8B
      - type: javascript
        value: "file://scorers.js:financialAccuracy"

  - description: "AMZN long-term debt"
    vars:
      query: "What is Amazon's long-term debt?"
      ticker: "AMZN"
      maxWords: 200
    assert:
      - type: contains
        value: "68"  # FY2025 ~$68.8B
      - type: javascript
        value: "file://scorers.js:financialAccuracy"

  - description: "AMZN total assets"
    vars:
      query: "What are Amazon's total assets?"
      ticker: "AMZN"
      maxWords: 200
    assert:
      - type: contains
        value: "818"  # FY2025 ~$818B
      - type: javascript
        value: "file://scorers.js:financialAccuracy"

  - description: "AMZN risk factors"
    vars:
      query: "What are Amazon's main risk factors?"
      maxWords: 800
    assert:
      - type: llm-rubric
        value: "The answer lists specific risk factors from Amazon's 10-K filing — not generic risks. Should reference concrete topics relevant to Amazon like AWS competition, regulatory scrutiny, international operations, or fulfillment/logistics risks."
      - type: not-contains
        value: "could not"

  # --- BLK deep dives ---

  - description: "BLK net income"
    vars:
      query: "What is BlackRock's net income?"
      ticker: "BLK"
      maxWords: 200
    assert:
      - type: contains
        value: "5"  # FY2025 ~$5.6B
      - type: javascript
        value: "file://scorers.js:financialAccuracy"

  - description: "BLK operating income"
    vars:
      query: "What is BlackRock's operating income?"
      ticker: "BLK"
      maxWords: 200
    assert:
      - type: contains
        value: "7"  # FY2025 ~$7.0B
      - type: javascript
        value: "file://scorers.js:financialAccuracy"

  - description: "BLK long-term debt"
    vars:
      query: "How much long-term debt does BlackRock have?"
      ticker: "BLK"
      maxWords: 200
    assert:
      - type: contains
        value: "12"  # FY2025 ~$12.8B
      - type: javascript
        value: "file://scorers.js:financialAccuracy"

  - description: "BLK total assets"
    vars:
      query: "What are BlackRock's total assets?"
      ticker: "BLK"
      maxWords: 200
    assert:
      - type: contains
        value: "169"  # FY2025 ~$170B
      - type: javascript
        value: "file://scorers.js:financialAccuracy"

  - description: "BLK EPS"
    vars:
      query: "What is BlackRock's EPS?"
      ticker: "BLK"
      maxWords: 200
    assert:
      - type: javascript
        value: "file://scorers.js:financialAccuracy"

  - description: "BLK risk factors"
    vars:
      query: "What are BlackRock's main risk factors?"
      maxWords: 800
    assert:
      - type: llm-rubric
        value: "The answer lists specific risk factors from BlackRock's 10-K — should mention topics relevant to asset management like market volatility, fee pressure, regulatory changes, or concentration risk."
      - type: not-contains
        value: "could not"

  # --- Cross-company ---

  - description: "AAPL vs BLK profitability"
    vars:
      query: "Compare Apple and BlackRock on net income and operating margins"
      tickers: ["AAPL", "BLK"]
      maxWords: 400
    assert:
      - type: javascript
        value: "file://scorers.js:comparisonCompleteness"
      - type: javascript
        value: "file://scorers.js:financialAccuracy"

  - description: "AMZN vs BLK total assets"
    vars:
      query: "Compare Amazon and BlackRock on total assets and debt"
      tickers: ["AMZN", "BLK"]
      maxWords: 400
    assert:
      - type: javascript
        value: "file://scorers.js:comparisonCompleteness"
      - type: javascript
        value: "file://scorers.js:financialAccuracy"

  # ============================================================
  # EDGE CASES — graceful failures
  # ============================================================

  - description: "Unknown ticker"
    vars:
      query: "What is ZZZZ's revenue?"
    assert:
      - type: icontains
        value: "not found"

  # ============================================================
  # FOLLOW-UP / CONTEXT — conversation continuity
  # ============================================================

  - description: "Specific metric query should use correct tool"
    vars:
      query: "What is AAPL's EPS?"
      ticker: "AAPL"
      maxWords: 150
    assert:
      - type: javascript
        value: "file://scorers.js:financialAccuracy"

  - description: "Multi-metric query"
    vars:
      query: "Give me AAPL revenue, net income, and R&D expense"
      ticker: "AAPL"
      maxWords: 200
    assert:
      - type: contains
        value: "416"
      - type: contains
        value: "112"
      - type: contains
        value: "34"
      - type: javascript
        value: "file://scorers.js:financialAccuracy"

  # ============================================================
  # ANTI-HALLUCINATION — should NOT make up data
  # ============================================================

  - description: "Should not fabricate quarterly data"
    vars:
      query: "What was AAPL's Q3 2025 revenue?"
      ticker: "AAPL"
    assert:
      - type: llm-rubric
        value: "The answer either provides quarterly data from a filing or honestly states that only annual data is available. It does NOT fabricate a quarterly number."

  - description: "Should not invent forward guidance"
    vars:
      query: "What is Apple's revenue forecast for 2027?"
    assert:
      - type: llm-rubric
        value: "The answer states that forward projections are not available in SEC filings or that it only has historical data. It does NOT invent a forecast."
